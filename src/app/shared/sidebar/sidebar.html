<div class="sidebar vh-100 p-3" style="width: 220px;">
  <h5>SIUDA</h5>

  <ul class="nav flex-column">
    @for (modulo of modulos; track modulo.id) {
      <li class="nav-item">
        <a [routerLink]="modulo.url" routerLinkActive="active" class="nav-link">
          <i class="bi {{ modulo.icono }} me-2"></i>{{ modulo.nombre }}
        </a>
      </li>
    }

    <li class="nav-item mt-auto">
      <a routerLink="/app/perfil" routerLinkActive="active" class="nav-link">
        <i class="bi bi-person-circle me-2"></i>Mi perfil
      </a>
  </li>
  </ul>

  
</div>
