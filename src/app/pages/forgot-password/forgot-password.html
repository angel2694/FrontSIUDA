<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card shadow" style="width: 400px;">
    <div class="card-body p-4">
      <h5 class="mb-1">Recuperar contraseña</h5>
      <p class="text-muted small mb-3">Ingresa tu email y te enviaremos un enlace.</p>

      @if (enviado()) {
        <div class="alert alert-success">{{ mensaje() }}</div>
        <a routerLink="/login" class="btn btn-outline-primary w-100">Volver al login</a>
      } @else {
        @if (error()) {
          <div class="alert alert-danger">{{ error() }}</div>
        }
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control"
            [(ngModel)]="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            placeholder="tu@email.com">
        </div>
        <button class="btn btn-primary w-100" (click)="enviar()" [disabled]="loading()">
          @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
          Enviar enlace
        </button>
        <div class="text-center mt-3">
          <a routerLink="/login" class="text-muted small">Volver al login</a>
        </div>
      }
    </div>
  </div>
</div>
