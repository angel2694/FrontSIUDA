<main class="main">

  <div class="topbar">
    <h1>Gestión de Categorías</h1>
  </div>

  @if (mensaje()) {
    <div class="alert alert-success">{{ mensaje() }}</div>
  }
  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  <div class="panel mb-3">
    <h5 class="mb-3">Nueva Categoría</h5>
    <input class="form-control mb-2" placeholder="Nombre"
      [value]="nombre()" (input)="nombre.set($any($event.target).value)">
    <input class="form-control mb-2" placeholder="Descripción"
      [value]="descripcion()" (input)="descripcion.set($any($event.target).value)">
    <button class="btn btn-success btn-sm" (click)="crearCategoria()">
      <i class="bi bi-plus me-1"></i>Guardar
    </button>
  </div>

  @if (loading()) {
    <div class="text-center py-4"><div class="spinner-border text-success"></div></div>
  } @else {
    <div class="panel">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          @for (c of categorias; track c.id) {
            <tr>
              <td>{{ c.id }}</td>
              <td>{{ c.name }}</td>
              <td>{{ c.description }}</td>
              <td>
                <span class="badge" [class.bg-success]="c.is_active" [class.bg-danger]="!c.is_active">
                  {{ c.is_active ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }

</main>
