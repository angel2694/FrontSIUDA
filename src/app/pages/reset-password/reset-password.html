<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card shadow" style="width: 400px;">
    <div class="card-body p-4">
      <h5 class="mb-3">Nueva contraseña</h5>

      @if (listo()) {
        <div class="alert alert-success">{{ mensaje() }}<br><small>Redirigiendo al login...</small></div>
      } @else {
        @if (error()) {
          <div class="alert alert-danger">{{ error() }}</div>
        }
        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" class="form-control"
            [ngModel]="passwordNueva()"
            (ngModelChange)="passwordNueva.set($event)">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control"
            [ngModel]="passwordNueva2()"
            (ngModelChange)="passwordNueva2.set($event)">
        </div>
        <button class="btn btn-primary w-100" (click)="confirmar()" [disabled]="loading()">
          @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
          Restablecer contraseña
        </button>
        <div class="text-center mt-3">
          <a routerLink="/login" class="text-muted small">Volver al login</a>
        </div>
      }
    </div>
  </div>
</div>
