<main class="main">

  <div class="topbar">
    <h1>Gestión de Áreas</h1>
  </div>

  @if (mensaje()) {
    <div class="alert alert-success">{{ mensaje() }}</div>
  }
  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  <div class="panel mb-3">
    <h5 class="mb-3">Nueva Área</h5>
    <input class="form-control mb-2" placeholder="Nombre"
      [value]="nombre()" (input)="nombre.set($any($event.target).value)">
    <input class="form-control mb-2" placeholder="Descripción"
      [value]="descripcion()" (input)="descripcion.set($any($event.target).value)">
    <button class="btn btn-success btn-sm" (click)="crearArea()">
      <i class="bi bi-plus me-1"></i>Guardar
    </button>
  </div>

  @if (loading()) {
    <div class="text-center py-4"><div class="spinner-border text-success"></div></div>
  } @else {
    <div class="panel">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          @for (a of areas(); track a.id) {
            <tr>
              <td>{{ a.id }}</td>
              <td>{{ a.name }}</td>
              <td>{{ a.description }}</td>
              <td>
                <span class="badge" [class.bg-success]="a.is_active" [class.bg-danger]="!a.is_active">
                  {{ a.is_active ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }

</main>
