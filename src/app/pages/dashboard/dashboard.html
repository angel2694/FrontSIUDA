<main class="main">

  <div class="topbar">
    <div>
      <h1>Panel Principal</h1>
      <p class="welcome">Bienvenido, <strong>{{ username() }}</strong></p>
    </div>
    <span class="date">{{ today }}</span>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h4>Productos</h4>
      <p class="number">{{ totalProductos }}</p>
      <span class="sub">En catálogo</span>
    </div>
    <div class="card">
      <h4>Categorías</h4>
      <p class="number">{{ totalCategorias }}</p>
      <span class="sub green">Registradas</span>
    </div>
    <div class="card">
      <h4>Proveedores</h4>
      <p class="number">{{ totalProveedores }}</p>
      <span class="sub">Activos</span>
    </div>
    <div class="card">
      <h4>Proformas</h4>
      <p class="number">{{ totalProformas }}</p>
      <span class="sub">Total registradas</span>
    </div>
  </div>

  <!-- GRÁFICOS -->
  <div class="grid">
    <div class="panel">
      <apx-chart
        [series]="donaOptions.series"
        [chart]="donaOptions.chart"
        [labels]="donaOptions.labels"
        [colors]="donaOptions.colors"
        [legend]="donaOptions.legend"
        [title]="donaOptions.title"
        [plotOptions]="donaOptions.plotOptions"
        [noData]="donaOptions.noData">
      </apx-chart>
    </div>
    <div class="panel">
      <apx-chart
        [series]="barOptions.series"
        [chart]="barOptions.chart"
        [colors]="barOptions.colors"
        [xaxis]="barOptions.xaxis"
        [title]="barOptions.title"
        [plotOptions]="barOptions.plotOptions"
        [dataLabels]="barOptions.dataLabels"
        [noData]="barOptions.noData">
      </apx-chart>
    </div>
  </div>

</main>
