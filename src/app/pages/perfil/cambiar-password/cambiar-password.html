<div class="container py-4">
  <div class="card shadow p-4" style="max-width: 500px;">
    <h4 class="mb-4">Cambiar contraseña</h4>

    <div *ngIf="errorMessage()" class="alert alert-danger">{{ errorMessage() }}</div>
    <div *ngIf="successMessage()" class="alert alert-success">{{ successMessage() }}</div>

    <div class="mb-3">
      <label class="form-label">Contraseña actual</label>
      <input type="password" class="form-control"
        [value]="passwordActual()" (input)="passwordActual.set($any($event.target).value)">
    </div>

    <div class="mb-3">
      <label class="form-label">Nueva contraseña</label>
      <input type="password" class="form-control"
        [value]="passwordNueva()" (input)="passwordNueva.set($any($event.target).value)">
    </div>

    <div class="mb-3">
      <label class="form-label">Confirmar nueva contraseña</label>
      <input type="password" class="form-control"
        [value]="passwordNueva2()" (input)="passwordNueva2.set($any($event.target).value)">
    </div>

    <button class="btn btn-primary w-100" (click)="cambiar()" [disabled]="loading()">
      {{ loading() ? 'Guardando...' : 'Cambiar contraseña' }}
    </button>

    <button class="btn btn-link w-100 mt-2" (click)="volver()">
        Volver al perfil
    </button>
  </div>
</div>
