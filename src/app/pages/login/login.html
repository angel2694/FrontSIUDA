<div class="container min-vh-100 d-flex justify-content-center align-items-center">
  <div class="card shadow p-4" style="width: 380px;">
    <h3 class="text-center mb-4">Iniciar sesión</h3>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input
          type="text"
          class="form-control"
          name="username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event); clearError()"
          required
        >
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          name="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event); clearError()"
          required
        >
      </div>

      @if (errorMessage()) {
        <div class="alert alert-danger">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2"></span>Validando...
        } @else {
          Ingresar
        }
      </button>

    </form>
    <div class="text-center mt-2">
      <button type="button" class="btn btn-secondary w-100" routerLink="/register">
        Crear cuenta
      </button>
      <button type="button" class="btn btn-link w-100" routerLink="/forgot-password">
        ¿Olvidaste tu contraseña?
      </button>
    </div>
  </div>
</div>
